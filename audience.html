<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-workshop, chefsgruppen (BIN) — Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f97316;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            background: var(--surface);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 { font-size: 1.2rem; font-weight: 700; }
        header h1 span { color: var(--accent); }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 600;
        }
        .pulse {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Content Area */
        main {
            flex: 1;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .focus-screen {
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .focus-screen .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
        .focus-screen h2 { font-size: 1.5rem; color: var(--text-muted); font-weight: 600; }

        .material-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .material-card h3 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .material-card ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        .material-card li { margin-bottom: 0.5rem; color: #cbd5e1; }
        .material-card a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        .material-card a:hover { text-decoration: underline; }
        .material-card p { line-height: 1.6; color: #cbd5e1; margin-bottom: 1rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            color: var(--text-muted);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <header>
        <h1>chefsgruppen (BIN) <span>Live</span></h1>
        <div class="live-indicator"><div class="pulse"></div> Synkad med presentationen</div>
    </header>

    <main id="contentArea">
        <div class="focus-screen">
            <span class="emoji">👀</span>
            <h2>Inväntar presentationen...</h2>
        </div>
    </main>

    <div id="toast">Uppdaterad</div>

    <script>
        const kvKey = 'HakanBIN2026_LiveSync';
        const IM_URL = 'https://keyvalue.immanuel.co/api/KeyVal/GetValue/' + kvKey;
        
        let lastState = '';
        const contentArea = document.getElementById('contentArea');
        const toast = document.getElementById('toast');

        function hexToUtf8(hex) {
            try {
                if (hex.length % 2 !== 0) return "";
                const bytes = new Uint8Array(hex.length / 2);
                for (let i = 0; i < hex.length; i += 2) {
                    bytes[i/2] = parseInt(hex.substr(i, 2), 16);
                }
                const decoder = new TextDecoder("utf-8");
                return decoder.decode(bytes);
            } catch(e) {
                return "";
            }
        }

        function showToast() {
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        async function pollState() {
            try {
                const response = await fetch(IM_URL);
                const raw = await response.text();
                // strip quotes
                const data = raw.replace(/^"|"$/g, '');
                
                if (data && data !== lastState) {
                    lastState = data;
                    const parts = data.split('_');
                    if (parts.length >= 3) {
                        const slideIdx = parts[0];
                        const pushType = parts[1]; // 'auto' or 'manual'
                        const hexContent = parts[2];
                        
                        const decodedContent = hexToUtf8(hexContent);
                        
                        // Parse as JSON if it is a JSON focus message, else render as HTML
                        if (decodedContent.startsWith('{') && decodedContent.endsWith('}')) {
                            try {
                                const obj = JSON.parse(decodedContent);
                                contentArea.innerHTML = `
                                    <div class="focus-screen">
                                        <span class="emoji">${obj.emoji || '👀'}</span>
                                        <h2>${obj.message || 'Lyssna på Håkan'}</h2>
                                    </div>
                                `;
                            } catch(e) {
                                contentArea.innerHTML = `<div class="material-card">${decodedContent}</div>`;
                            }
                        } else {
                            // Render as HTML
                            contentArea.innerHTML = `<div class="material-card">${decodedContent}</div>`;
                            // Play a subtle notification sound or vibration if manual push
                            if (pushType === 'manual' && navigator.vibrate) {
                                navigator.vibrate([100, 50, 100]);
                            }
                        }
                        showToast();
                    }
                }
            } catch (error) {
                console.error("Polling error:", error);
            }
        }

        // Poll every 2 seconds
        setInterval(pollState, 2000);
        pollState(); // Initial poll
    </script>
</body>
</html>
