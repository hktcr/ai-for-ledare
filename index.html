<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI för BINs chefer — 21 maj 2026</title>
    <meta name="description" content="Showcase av 9 animerade slide-typer i SlideCraft Component Forge. All data är fiktiv/demo.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
            --surface: rgba(30,27,75,0.5);
            --card-bg: rgba(30,27,75,0.8);
            --card-bg-hover: rgba(49,46,129,0.8);
            --text: #f1f5f9; --text-muted: rgba(255,255,255,0.7);
            --accent: #f97316; --accent2: #fb923c;
            --green: #22c55e; --yellow: #eab308; --red: #ef4444;
            --border: rgba(255,255,255,0.15); --border-hover: rgba(255,255,255,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* === HEADER === */
        .showcase-header {
            text-align: center; padding: 1.8rem 1rem 0.8rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .showcase-header h1 { font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 900; letter-spacing: -0.02em; }
        .showcase-header h1 span { color: var(--accent); }
        .showcase-header p { color: var(--text-muted); font-size: 0.75rem; margin-top: 0.3rem; opacity: 0.7; }

        /* === THEME SWITCHER === */
        .theme-row {
            display: flex; justify-content: center; gap: 0.4rem;
            padding: 0.8rem 0; flex-wrap: wrap;
        }
        .theme-pill {
            padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.65rem;
            border: 1px solid var(--border); background: transparent; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
        }
        .theme-pill:hover { border-color: var(--text-muted); color: var(--text); }
        .theme-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* === SETLIST CONTROLS === */
        .setlist-bar {
            display: flex; justify-content: center; align-items: center; gap: 0.5rem;
            padding: 0.4rem 1rem; background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }
        .setlist-bar label {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-muted);
        }
        .setlist-bar input {
            font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 6px; color: var(--accent); padding: 0.3rem 0.6rem;
            width: clamp(200px, 40vw, 500px); outline: none; transition: border-color 0.2s;
        }
        .setlist-bar input:focus { border-color: var(--accent); }
        .setlist-bar input::placeholder { color: var(--text-muted); opacity: 0.4; }
        .setlist-bar .setlist-count {
            font-size: 0.55rem; color: var(--text-muted); opacity: 0.6;
            font-family: 'JetBrains Mono', monospace;
        }
        .setlist-bar button {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-muted); font-size: 0.6rem; padding: 0.25rem 0.5rem;
            cursor: pointer; transition: all 0.2s;
        }
        .setlist-bar button:hover { border-color: var(--accent); color: var(--accent); }

        /* Inactive section divider */
        .inactive-divider {
            display: flex; align-items: center; gap: 0.6rem;
            margin: 1.8rem 0 0.6rem; padding-bottom: 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .inactive-divider .divider-label {
            font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted); opacity: 0.4;
        }
        .inactive-divider .divider-count {
            font-size: 0.5rem; color: var(--text-muted); opacity: 0.3;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Inactive card styling */
        .slide-card.inactive {
            opacity: 0.35; border-style: dashed;
        }
        .slide-card.inactive:hover { opacity: 0.7; }

        /* Setlist position badge on active cards */
        .slide-card .setlist-pos {
            position: absolute; top: 0.3rem; right: 0.5rem;
            font-size: 0.55rem; font-weight: 700;
            color: var(--accent); font-family: 'JetBrains Mono', monospace;
        }

        /* === CARD GRID === */
        .card-view {
            padding: 1rem 1.2rem 2rem; max-width: 1100px; margin: 0 auto;
        }
        .card-view.hidden { display: none; }

        /* Section headers */
        .section-header {
            display: flex; align-items: center; gap: 0.6rem;
            margin: 1.4rem 0 0.6rem; padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--border);
        }
        .section-header:first-child { margin-top: 0.6rem; }
        .section-header .section-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .section-header .section-label {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--text-muted);
        }
        .section-header .section-count {
            font-size: 0.55rem; color: var(--text-muted); opacity: 0.5;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Card grid within each section */
        .section-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobile-first: 1 kolumn */
            gap: 0.5rem;
        }
        @media (min-width: 500px) {
            .section-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 0.6rem; }
        }
        @media (min-width: 1000px) {
            .section-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 0.6rem; }
        }

        .slide-card {
            background: var(--card-bg); border-radius: 10px;
            border: 1px solid var(--border); cursor: pointer; transition: all 0.25s ease;
            display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-end;
            text-align: left; padding: 1rem 1rem 0.8rem; position: relative; overflow: hidden;
            min-height: 80px;
        }
        .slide-card:hover {
            border-color: var(--accent); transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249,115,22,0.15);
            background: var(--card-bg-hover);
        }
        .slide-card .card-num {
            position: absolute; top: 0.4rem; left: 0.6rem; font-size: 0.6rem;
            font-family: 'JetBrains Mono', monospace; color: var(--text-muted); opacity: 0.5;
        }
        .slide-card .card-title {
            font-weight: 600; font-size: 0.88rem; line-height: 1.35; color: var(--text);
        }
        .slide-card .card-subtitle {
            font-size: 0.68rem; color: var(--text-muted); margin-top: 0.2rem; line-height: 1.25;
        }

        /* === FULLSCREEN VIEW === */
        .slide-view {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; z-index: 100;
            align-items: center; justify-content: center;
        }
        .slide-view.active { display: flex; }
        
        .slide-content {
            /* Perfectly letterboxed 16:9 container */
            width: 100vw;
            height: 56.25vw; /* 9/16 */
            max-height: 100vh;
            max-width: 177.78vh; /* 16/9 */
            margin: auto;
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            container-type: size; /* Enables container queries (cqmin) for true responsive text */
        }
        
        .close-btn {
            position: fixed; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 44px; height: 44px; border-radius: 50%; font-size: 1.3rem;
            cursor: pointer; z-index: 101; transition: all 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.2); }

        .slide-counter {
            position: fixed; bottom: 1.5rem; right: 1.5rem; font-size: 0.7rem;
            color: var(--text-muted); font-family: 'JetBrains Mono', monospace; z-index: 101;
        }
        .demo-watermark {
            position: fixed; top: 0.8rem; left: 1rem; font-size: 0.6rem; color: rgba(239,68,68,0.4);
            font-weight: 700; letter-spacing: 0.1em; z-index: 101;
        }

        /* === TITLE SLIDE (manual) === */
        .slide-title-custom { text-align: center; padding: 2rem; width: 100%; }
        .slide-title-custom h1 { font-size: clamp(2rem, 8cqmin, 5rem); font-weight: 900; line-height: 1.1; }
        .slide-title-custom h1 span { color: var(--accent); }
        .slide-title-custom .subtitle { font-size: clamp(1rem, 3cqmin, 2rem); color: var(--text-muted); margin-top: 1rem; }
        .slide-title-custom .note { font-size: 0.8rem; color: rgba(239,68,68,0.6); margin-top: 2rem; }

        /* Rewrite progression */
        .slide-rewrite { text-align: center; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; cursor: pointer; }
        .rewrite-prefix { font-size: clamp(1.4rem, 3cqmin, 2.5rem); font-weight: 300; color: var(--accent); opacity: 0; transition: opacity 0.6s ease; font-style: italic; }
        .rewrite-prefix.visible { opacity: 1; }
        .rewrite-main { font-size: clamp(2rem, 5cqmin, 4rem); font-weight: 300; line-height: 1.5; color: var(--text); }
        .rewrite-main .rw-slot { display: inline; color: var(--text-muted); transition: color 0.4s ease; }
        .rewrite-main .rw-slot.active { border-right: 2px solid var(--accent); animation: blink-border 0.8s step-end infinite; color: var(--accent); }
        .rewrite-main .rw-slot.changed { color: var(--accent); }

        @keyframes blink-border { 50% { border-color: transparent; } }
        @keyframes blink-block { 50% { opacity: 0; } }
        .cursor { font-weight: 300; color: var(--accent); animation: blink-block 1s step-end infinite; }

        /* Auditorium scaling — removed, handled per-section now */
        
        /* === AUDITORIUM SCALING OVERRIDES (Gäller alla slides) === */
        html.presentation-mode {
            /* Now using cqmin which is relative to the 16:9 container, not the chaotic viewport! */
            font-size: clamp(14px, 3.5cqmin, 48px);
        }
        
        html.presentation-mode.scale-dense {
            font-size: clamp(12px, 2.5cqmin, 36px); 
        }
        
        html.presentation-mode.scale-large {
            font-size: clamp(18px, 4.5cqmin, 64px); 
        }
        
        #slideContent > div[class^="slide-"] {
            width: 100% !important;
            height: 100% !important;
        }
        
        #fullscreenBtn:hover { opacity: 1 !important; color: var(--text) !important; }

        /* === PRESENTER LINK BAR (Collapsible) === */
        .presenter-toggle {
            display: flex; justify-content: center; padding: 0.3rem;
            background: rgba(0,0,0,0.15); border-bottom: 1px solid var(--border);
        }
        .presenter-toggle button {
            background: none; border: 1px solid var(--border); border-radius: 999px;
            color: var(--text-muted); font-size: 0.58rem; padding: 0.2rem 0.7rem;
            cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
            letter-spacing: 0.05em;
        }
        .presenter-toggle button:hover { border-color: var(--accent); color: var(--accent); }
        .presenter-links {
            display: none; flex-wrap: wrap; justify-content: center; gap: 0.5rem;
            padding: 0.5rem 1rem; background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
            font-size: 0.65rem;
        }
        .presenter-links.open { display: flex; }
        .presenter-links .pl-group {
            display: flex; align-items: center; gap: 0.35rem;
            border-right: 1px solid var(--border); padding-right: 0.7rem;
        }
        .presenter-links .pl-group:last-child { border-right: none; padding-right: 0; }
        .presenter-links .pl-label {
            font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.55rem;
        }
        .presenter-links a.pl-link, .presenter-links button.pl-copy {
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            color: var(--accent); background: rgba(249,115,22,0.1);
            border: 1px solid rgba(249,115,22,0.3); border-radius: 5px;
            padding: 0.2rem 0.45rem; cursor: pointer; text-decoration: none;
            transition: all 0.2s; white-space: nowrap;
        }
        .presenter-links a.pl-link:hover, .presenter-links button.pl-copy:hover {
            background: rgba(249,115,22,0.25); border-color: var(--accent);
        }
        .presenter-links button.pl-copy.ok { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.15); }
        .presenter-links .pl-tag {
            font-size: 0.5rem; padding: 0.1rem 0.35rem; border-radius: 999px; font-weight: 700;
        }
        .pl-tag.speaker { background: rgba(139,92,246,0.2); color: #c084fc; border: 1px solid rgba(139,92,246,0.4); }
        .pl-tag.audience { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.35); }
        .pl-tag.public { background: rgba(249,115,22,0.15); color: var(--accent); border: 1px solid rgba(249,115,22,0.35); }
        .pl-tag.todo { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.35); }
    </style>
</head>
<body id="appBody">
    <div class="showcase-header" id="showcaseHeader">
        <button class="fullscreen-btn" id="deckFullscreenBtn" title="Helskärm (F)" style="position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.6rem; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; transition: all 0.2s;">⛶</button>

    <div class="setlist-bar" id="setlistBar">
        <label>Setlist</label>
        <input type="text" id="setlistInput" placeholder="ex: 1,15,16,17,18,21,29" spellcheck="false">
        <span class="setlist-count" id="setlistCount"></span>
        <button onclick="document.getElementById('setlistInput').value=''; document.getElementById('setlistInput').dispatchEvent(new Event('input'));">Rensa</button>
    </div>

    <div class="card-view" id="cardView"></div>

    <div class="slide-view" id="slideView">
        <button class="close-btn" id="closeBtn" title="Tillbaka (Esc)">✕</button>
        
        <div class="slide-content" id="slideContent"></div>

        <div class="slide-counter" id="slideCounter"></div>
    </div>

    <script>
    // ===== COMPONENT FORGE — INLINED (Sprint 1+2+3) =====
    // Injecting CSS + all 9 renderers inline for zero-dependency deploy.
    </script>
    <script src="modules/component-forge.js?v=11"></script>

    <script>
    (function() {
        'use strict';

        let slidesData = [];
        let currentIdx = 0;

        // === GLOBAL UTILS ===
        window.copyUrl = function(btn, url) {
            navigator.clipboard.writeText(url).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
            });
            btn.classList.add('ok'); btn.textContent = '✅';
            setTimeout(() => { btn.classList.remove('ok'); btn.textContent = '📋'; }, 2000);
        };

        // === LIVE SYNC & SPEAKER MODE ===
        const urlParams = new URLSearchParams(window.location.search);
        const isSpeakerMode = urlParams.get('mode') === 'speaker';
        const kvKey = 'HakanBIN2026_LiveSync'; 
        const IM_URL = 'https://keyvalue.immanuel.co/api/KeyVal/UpdateValue/' + kvKey + '/';

        function pushLiveState(slideIdx, contentType) {
            const s = slidesData[slideIdx];
            if (!s) return;
            
            let contentToPush = '';
            if (contentType === 'auto') {
                contentToPush = s.audience_content_auto || JSON.stringify({status: 'focus', message: 'Lyssna på Håkan', emoji: '👀'});
            } else if (contentType === 'manual') {
                contentToPush = s.audience_content_manual || s.audience_content_auto || JSON.stringify({status: 'focus', message: 'Lyssna på Håkan', emoji: '👀'});
            }
            
            // Hex encode to bypass URL and CORS character issues
            let hexStr = '';
            const encoder = new TextEncoder();
            const bytes = encoder.encode(contentToPush);
            for (let i = 0; i < bytes.length; i++) {
                hexStr += bytes[i].toString(16).padStart(2, '0');
            }
            
            const payload = slideIdx + '_' + contentType + '_' + hexStr;
            fetch(IM_URL + payload, { method: 'POST', mode: 'no-cors' }).catch(console.error);
        }

        // === THEMES (optimerade för BIN-workshopen) ===
        const themes = {
            'EHT Midnight (Orange)': {"--bg":"radial-gradient(circle at center, #1e1b4b 0%, #000000 100%)","--surface":"rgba(30,27,75,0.5)","--card-bg":"rgba(30,27,75,0.8)","--card-bg-hover":"rgba(49,46,129,0.8)","--text":"#f1f5f9","--text-muted":"rgba(255,255,255,0.7)","--accent":"#f97316","--accent2":"#fb923c","--border":"rgba(255,255,255,0.15)","--border-hover":"rgba(255,255,255,0.3)"},
            'EHT Midnight (Blå)': {"--bg":"radial-gradient(circle at center, #1e1b4b 0%, #000000 100%)","--surface":"rgba(30,27,75,0.5)","--card-bg":"rgba(30,27,75,0.8)","--card-bg-hover":"rgba(49,46,129,0.8)","--text":"#f1f5f9","--text-muted":"rgba(255,255,255,0.7)","--accent":"#38bdf8","--accent2":"#818cf8","--border":"rgba(255,255,255,0.15)","--border-hover":"rgba(255,255,255,0.3)"},
            'Auditorium Dark': {"--bg":"#000","--surface":"#1a1a1a","--card-bg":"#2a2a2a","--card-bg-hover":"#333","--text":"#f1f5f9","--text-muted":"rgba(255,255,255,0.7)","--accent":"#f97316","--accent2":"#a855f7","--border":"rgba(255,255,255,0.15)","--border-hover":"rgba(255,255,255,0.3)"},
            'Åstorp Ljust': {"--bg":"#f8fafc","--surface":"#f1f5f9","--card-bg":"#e2e8f0","--card-bg-hover":"#cbd5e1","--text":"#0f172a","--text-muted":"rgba(15,23,42,0.7)","--accent":"#ea580c","--accent2":"#4f46e5","--border":"rgba(15,23,42,0.15)","--border-hover":"rgba(15,23,42,0.3)"}
        };

        let activeTheme = 'EHT Midnight (Orange)';

        // Build theme pills for main menu
        const themeRow = document.getElementById('themeRow');
        
        Object.keys(themes).forEach(name => {
            const pill = document.createElement('button');
            pill.className = 'theme-pill' + (name === activeTheme ? ' active' : '');
            pill.textContent = name;
            pill.onclick = () => applyTheme(name);
            themeRow.appendChild(pill);
        });

        function applyTheme(name) {
            const vars = themes[name]; if (!vars) return;
            activeTheme = name;
            Object.entries(vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
            document.querySelectorAll('.theme-pill').forEach(p => p.classList.toggle('active', p.textContent === name));
        }

        // === TITLE SLIDE RENDERER ===
        window.slideTypeRegistry = window.slideTypeRegistry || {};
        window.slideTypeRegistry['title'] = function(s) {
            const parts = (s.title || '').split(' ');
            const last = parts.pop();
            return `<div class="slide-title-custom">
                <h1>${parts.join(' ')} <span>${last}</span></h1>
                <div class="subtitle">${s.subtitle || ''}</div>
                ${s.note ? `<div class="note">${s.note}</div>` : ''}
            </div>`;
        };

        // === SETLIST STATE ===
        let setlistOrder = []; // array of 0-based indices
        const SETLIST_KEY = 'HakanBIN2026_Setlist';

        function loadSetlist() {
            // Priority: URL param > localStorage
            const urlSetlist = urlParams.get('setlist');
            if (urlSetlist) {
                document.getElementById('setlistInput').value = urlSetlist;
                parseSetlist(urlSetlist);
                localStorage.setItem(SETLIST_KEY, urlSetlist);
                return;
            }
            const saved = localStorage.getItem(SETLIST_KEY);
            if (saved) {
                document.getElementById('setlistInput').value = saved;
                parseSetlist(saved);
            }
        }

        function parseSetlist(str) {
            if (!str.trim()) {
                setlistOrder = [];
                return;
            }
            setlistOrder = str.split(',').map(s => parseInt(s.trim(), 10) - 1).filter(n => !isNaN(n) && n >= 0 && n < slidesData.length);
        }

        function syncSetlistToUrl(val) {
            const url = new URL(window.location);
            if (val.trim()) {
                url.searchParams.set('setlist', val.trim());
            } else {
                url.searchParams.delete('setlist');
            }
            // Remove other temp params
            url.searchParams.delete('t');
            history.replaceState(null, '', url);
        }

        document.getElementById('setlistInput').addEventListener('input', (e) => {
            const val = e.target.value;
            localStorage.setItem(SETLIST_KEY, val);
            syncSetlistToUrl(val);
            parseSetlist(val);
            updateSetlistCount();
            renderCards();
        });

        function updateSetlistCount() {
            const countEl = document.getElementById('setlistCount');
            if (setlistOrder.length > 0) {
                countEl.textContent = setlistOrder.length + ' / ' + slidesData.length + ' aktiva';
            } else {
                countEl.textContent = '';
            }
        }

        // === RENDER CARD GRID ===
        function renderCards() {
            const grid = document.getElementById('cardView');
            grid.innerHTML = '';

            const sectionDefs = window._sectionDefs || [];
            const sectionMap = {};
            sectionDefs.forEach(sec => { sectionMap[sec.id] = sec; });

            // If setlist is active, render in setlist order
            if (setlistOrder.length > 0) {
                // Active setlist header
                const activeHeader = document.createElement('div');
                activeHeader.className = 'section-header';
                activeHeader.innerHTML = `
                    <span class="section-dot" style="background: var(--accent)"></span>
                    <span class="section-label">Setlist</span>
                    <span class="section-count">${setlistOrder.length} slides</span>
                `;
                grid.appendChild(activeHeader);

                const activeGrid = document.createElement('div');
                activeGrid.className = 'section-grid';

                setlistOrder.forEach((slideIdx, setlistPos) => {
                    const s = slidesData[slideIdx];
                    if (!s) return;
                    const secDef = sectionMap[s.section] || { color: '#666' };
                    const card = document.createElement('div');
                    card.className = 'slide-card';
                    card.style.borderLeftColor = secDef.color;
                    card.style.borderLeftWidth = '2px';
                    card.innerHTML = `
                        <span class="card-num">${slideIdx + 1}</span>
                        <span class="setlist-pos">#${setlistPos + 1}</span>
                        <span class="card-title">${s.cardTitle || s.title || s.id}</span>
                    `;
                    card.onclick = () => openSlide(slideIdx);
                    activeGrid.appendChild(card);
                });
                grid.appendChild(activeGrid);

                // Inactive slides
                const inactiveIndices = [];
                slidesData.forEach((s, i) => {
                    if (!setlistOrder.includes(i)) inactiveIndices.push(i);
                });

                if (inactiveIndices.length > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'inactive-divider';
                    divider.innerHTML = `
                        <span class="divider-label">Inaktiva</span>
                        <span class="divider-count">${inactiveIndices.length} slides</span>
                    `;
                    grid.appendChild(divider);

                    const inactiveGrid = document.createElement('div');
                    inactiveGrid.className = 'section-grid';

                    inactiveIndices.forEach(slideIdx => {
                        const s = slidesData[slideIdx];
                        const secDef = sectionMap[s.section] || { color: '#666' };
                        const card = document.createElement('div');
                        card.className = 'slide-card inactive';
                        card.style.borderLeftColor = secDef.color;
                        card.style.borderLeftWidth = '2px';
                        card.innerHTML = `
                            <span class="card-num">${slideIdx + 1}</span>
                            <span class="card-title">${s.cardTitle || s.title || s.id}</span>
                        `;
                        card.onclick = () => openSlide(slideIdx);
                        inactiveGrid.appendChild(card);
                    });
                    grid.appendChild(inactiveGrid);
                }
            } else {
                // No setlist — render by section as before
                const groups = [];
                let lastSection = null;
                slidesData.forEach((s, i) => {
                    const secId = s.section || 'default';
                    if (secId !== lastSection) {
                        groups.push({ sectionId: secId, slides: [] });
                        lastSection = secId;
                    }
                    groups[groups.length - 1].slides.push({ slide: s, index: i });
                });

                groups.forEach(group => {
                    const secDef = sectionMap[group.sectionId] || { label: group.sectionId, color: '#666' };
                    const header = document.createElement('div');
                    header.className = 'section-header';
                    header.innerHTML = `
                        <span class="section-dot" style="background: ${secDef.color}"></span>
                        <span class="section-label">${secDef.label}</span>
                        <span class="section-count">${group.slides.length} slides</span>
                    `;
                    grid.appendChild(header);

                    const sectionGrid = document.createElement('div');
                    sectionGrid.className = 'section-grid';
                    group.slides.forEach(({ slide: s, index: i }) => {
                        const card = document.createElement('div');
                        card.className = 'slide-card';
                        card.style.borderLeftColor = secDef.color;
                        card.style.borderLeftWidth = '2px';
                        card.innerHTML = `
                            <span class="card-num">${i + 1}</span>
                            <span class="card-title">${s.cardTitle || s.title || s.id}</span>
                        `;
                        card.onclick = () => openSlide(i);
                        sectionGrid.appendChild(card);
                    });
                    grid.appendChild(sectionGrid);
                });
            }
        }

        // === SLIDE NAVIGATION ===
        function openSlide(idx) {
            window.handleNextStep = null;
            currentIdx = idx;
            const s = slidesData[idx];
            const renderer = window.slideTypeRegistry[s.type];
            const content = renderer ? renderer(s) : `<div style="text-align:center"><h2>${s.title || s.type}</h2><p>Typ "${s.type}" — ingen renderer registrerad</p></div>`;

            document.getElementById('slideContent').innerHTML = content;
            document.getElementById('slideView').classList.add('active');
            document.getElementById('cardView').classList.add('hidden');
            document.getElementById('showcaseHeader').style.display = 'none';
            document.getElementById('setlistBar').style.display = 'none';

            // Show setlist-aware counter
            if (setlistOrder.length > 0) {
                const posInSetlist = setlistOrder.indexOf(idx);
                if (posInSetlist >= 0) {
                    document.getElementById('slideCounter').textContent = `${posInSetlist + 1} / ${setlistOrder.length}`;
                } else {
                    document.getElementById('slideCounter').textContent = `#${idx + 1} (ej i setlist)`;
                }
            } else {
                document.getElementById('slideCounter').textContent = `${idx + 1} / ${slidesData.length}`;
            }
            
            // --- Slide Content Optimizer ---
            // Utvärdera sliden och applicera rätt skalnings-klass
            const denseTypes = ['line-chart', 'comparison', 'map-progression', 'bar-race', 'stat-compare', 'process-chain', 'timeline-vertical'];
            const largeTypes = ['title', 'quote', 'giant-text', 'rewrite-progression', 'letter-morph', 'box-reveal', 'portrait-quote', 'roles-diagram', 'warning-pulse'];
            
            document.documentElement.classList.remove('scale-dense', 'scale-large');
            if (s.size === 'large' || largeTypes.includes(s.type)) {
                document.documentElement.classList.add('scale-large');
            } else if (s.size === 'dense' || denseTypes.includes(s.type)) {
                document.documentElement.classList.add('scale-dense');
            }
            // -------------------------------
            
            // Switch to auditorium scaling
            document.documentElement.classList.add('presentation-mode');
            document.getElementById('presenterLinks').style.display = 'none';

            // Auto-push live state to audience when slide opens
            pushLiveState(idx, 'auto');
        }

        function closeSlide() {
            document.getElementById('slideView').classList.remove('active');
            document.getElementById('cardView').classList.remove('hidden');
            document.getElementById('showcaseHeader').style.display = '';
            document.getElementById('presenterLinks').style.display = '';
            document.getElementById('setlistBar').style.display = '';
            
            // Revert back to desktop showcase scaling
            document.documentElement.classList.remove('presentation-mode');
        }

        // Setlist-aware navigation
        window.nextSlide = function() {
            if (setlistOrder.length > 0) {
                const posInSetlist = setlistOrder.indexOf(currentIdx);
                if (posInSetlist >= 0 && posInSetlist < setlistOrder.length - 1) {
                    openSlide(setlistOrder[posInSetlist + 1]);
                }
                // If not in setlist, don't navigate
            } else {
                if (currentIdx < slidesData.length - 1) openSlide(currentIdx + 1);
            }
        };
        window.prevSlide = function() {
            if (setlistOrder.length > 0) {
                const posInSetlist = setlistOrder.indexOf(currentIdx);
                if (posInSetlist > 0) {
                    openSlide(setlistOrder[posInSetlist - 1]);
                }
            } else {
                if (currentIdx > 0) openSlide(currentIdx - 1);
            }
        };

        document.getElementById('closeBtn').onclick = closeSlide;

        document.getElementById('slideView').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.closest('.no-click-advance')) return;
            if (window.handleNextStep && window.handleNextStep()) return;
            window.nextSlide();
        });
        
        // === FULLSCREEN LOGIC ===
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        document.getElementById('deckFullscreenBtn').onclick = toggleFullScreen;

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeSlide();
            if (e.key === 'f' || e.key === 'F') toggleFullScreen();
            if (document.getElementById('slideView').classList.contains('active')) {
                // Manuell Push via M-tangenten (Alternativ 1)
                if (e.key === 'm' || e.key === 'M') {
                    e.preventDefault();
                    pushLiveState(currentIdx, 'manual');
                    // Visuell feedback
                    const counter = document.getElementById('slideCounter');
                    const orig = counter.textContent;
                    counter.textContent = '🚀 MATERIAL PUSHAT';
                    counter.style.color = 'var(--accent)';
                    counter.style.fontWeight = 'bold';
                    setTimeout(() => { 
                        counter.textContent = orig; 
                        counter.style.color = 'var(--text-muted)'; 
                        counter.style.fontWeight = 'normal';
                    }, 2000);
                    return;
                }
                
                if (e.key === ' ' || e.key === 'Enter') { 
                    e.preventDefault(); 
                    if (window.handleNextStep && window.handleNextStep()) return;
                    window.nextSlide(); 
                }
                if (e.key === 'ArrowRight') { e.preventDefault(); window.nextSlide(); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); window.prevSlide(); }
            }
        });

        // === SPEAKER DASHBOARD (Alternativ 2) ===
        if (isSpeakerMode) {
            const speakerPanel = document.createElement('div');
            speakerPanel.style.cssText = 'position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--accent); padding: 1rem; display: flex; justify-content: center; z-index: 1000;';
            speakerPanel.innerHTML = '<button id="speakerPushBtn" style="background: var(--green); color: white; border: none; padding: 1rem 2rem; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);">🚀 Skicka specialmaterial till publiken</button>';
            document.body.appendChild(speakerPanel);
            
            document.getElementById('speakerPushBtn').addEventListener('click', (e) => {
                e.stopPropagation(); // förhindra att klicket byter slide
                pushLiveState(currentIdx, 'manual');
                const btn = document.getElementById('speakerPushBtn');
                btn.textContent = '✅ MATERIAL PUSHAT!';
                btn.style.background = '#059669';
                setTimeout(() => { 
                    btn.textContent = '🚀 Skicka specialmaterial till publiken'; 
                    btn.style.background = 'var(--green)'; 
                }, 2000);
            });
            
            // Se till att presentationen inte hamnar bakom panelen
            document.getElementById('slideView').style.paddingBottom = '80px';
        }

        // === LOAD SLIDES ===
        function loadSlides() {
            // fetch fails on file:// protocol, use XMLHttpRequest as fallback
            if (window.location.protocol === 'file:') {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', 'slides.json', true);
                xhr.onload = function() {
                    if (xhr.status === 200 || xhr.status === 0) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            slidesData = data.slides || [];
                            window._sectionDefs = data.sections || [];
                            loadSetlist();
                            updateSetlistCount();
                            renderCards();
                        } catch(e) {
                            console.error('JSON parse error:', e);
                            document.getElementById('cardView').innerHTML = '<p style="text-align:center;padding:4rem;color:var(--red)">JSON-syntaxfel: ' + e.message + '</p>';
                        }
                    }
                };
                xhr.onerror = function() {
                    document.getElementById('cardView').innerHTML = '<p style="text-align:center;padding:4rem;color:var(--red)">Kunde inte ladda slides.json (kontrollera att filen finns)</p>';
                };
                xhr.send();
            } else {
                fetch('slides.json')
                    .then(r => r.json())
                    .then(data => {
                        slidesData = data.slides || [];
                        window._sectionDefs = data.sections || [];
                        loadSetlist();
                        updateSetlistCount();
                        renderCards();
                    })
                    .catch(err => {
                        console.error('Failed to load slides.json:', err);
                        document.getElementById('cardView').innerHTML = '<p style="text-align:center;padding:4rem;color:var(--red)">Kunde inte ladda slides.json</p>';
                    });
            }
        }
        loadSlides();
    })();
    </script>
</body>
</html>
